name: Haskell CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true

      - name: Cache Stack
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('stack.yaml', 'package.yaml', '*.cabal') }}
          restore-keys: |
            stack-${{ runner.os }}-

      - name: Build
        run: stack build --test --no-run-tests

      - name: Test
        run: stack test
