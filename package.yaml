name: ir-builder
version: 0.1.0.0
license: MIT
author: "Heikki Johannes Hildén"
maintainer: "hildenjohannes@gmail.com"
copyright: "2026-present Heikki Johannes Hildén"
synopsis: Monadic DSL for constructing LLVM IR
category: Compilers/Interpreters
homepage: https://codeberg.org/laserpants/ir-builder
bug-reports: https://codeberg.org/laserpants/ir-builder/issues

extra-source-files:
  - README.md

description: Please see the README at <https://codeberg.org/laserpants/ir-builder#readme>

dependencies:
  - base >= 4.7 && < 5
  - text >= 1.2 && < 3
  - bytestring >= 0.10 && < 0.13
  - containers >= 0.6 && < 0.8
  - mtl >= 2.2 && < 2.4

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

tests:
  proto-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    build-tools:
      - hspec-discover:hspec-discover
    dependencies:
      - ir-builder
      - hspec >= 2.10.0
